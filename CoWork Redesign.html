<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CoWork — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f4f4f5;
    color: #18181b;
    -webkit-font-smoothing: antialiased;
  }

  /* Demo nav */
  .demo-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    background: #18181b;
    display: flex; align-items: center; gap: 0; overflow-x: auto;
    padding: 0 12px;
    height: 38px;
    scrollbar-width: none;
  }
  .demo-nav::-webkit-scrollbar { display: none; }
  .demo-nav-label {
    color: #71717a; font-size: 11px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    padding-right: 12px; border-right: 1px solid #3f3f46;
    margin-right: 8px; white-space: nowrap; flex-shrink: 0;
  }
  .demo-btn {
    background: none; border: none; cursor: pointer;
    color: #a1a1aa; font-family: inherit; font-size: 11px; font-weight: 500;
    padding: 0 10px; height: 38px; white-space: nowrap; flex-shrink: 0;
    transition: color .15s;
    border-bottom: 2px solid transparent;
  }
  .demo-btn:hover { color: #fff; }
  .demo-btn.active { color: #818cf8; border-bottom-color: #818cf8; }

  .page-wrapper { padding-top: 38px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  .page-content { flex: 1; overflow: auto; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 99px; }

  /* Page transitions */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .page-animate { animation: fadeUp .22s cubic-bezier(.22,1,.36,1) both; }
  .fade-animate { animation: fadeIn .18s ease both; }
  .slide-animate { animation: slideInLeft .2s cubic-bezier(.22,1,.36,1) both; }

  /* Staggered children */
  .stagger > * { animation: fadeUp .22s cubic-bezier(.22,1,.36,1) both; }
  .stagger > *:nth-child(1)  { animation-delay: .03s; }
  .stagger > *:nth-child(2)  { animation-delay: .06s; }
  .stagger > *:nth-child(3)  { animation-delay: .09s; }
  .stagger > *:nth-child(4)  { animation-delay: .12s; }
  .stagger > *:nth-child(5)  { animation-delay: .15s; }
  .stagger > *:nth-child(6)  { animation-delay: .18s; }
  .stagger > *:nth-child(7)  { animation-delay: .21s; }
  .stagger > *:nth-child(8)  { animation-delay: .24s; }

  /* Activity timeline */
  .activity-item { animation: slideInLeft .2s cubic-bezier(.22,1,.36,1) both; }
  .activity-item:nth-child(1)  { animation-delay: .04s; }
  .activity-item:nth-child(2)  { animation-delay: .08s; }
  .activity-item:nth-child(3)  { animation-delay: .12s; }
  .activity-item:nth-child(4)  { animation-delay: .16s; }
  .activity-item:nth-child(5)  { animation-delay: .20s; }
  .activity-item:nth-child(6)  { animation-delay: .24s; }
  .activity-item:nth-child(7)  { animation-delay: .28s; }
  .activity-item:nth-child(8)  { animation-delay: .32s; }

  /* Tweak panel */
  .tweak-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 9998;
    background: #fff; border: 1px solid #e4e4e7; border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
    padding: 18px 20px; width: 240px;
    display: none;
  }
  .tweak-panel.visible { display: block; }
  .tweak-title { font-size: 12px; font-weight: 700; color: #18181b; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 14px; }
  .tweak-row { margin-bottom: 12px; }
  .tweak-row label { font-size: 11px; font-weight: 600; color: #71717a; display: block; margin-bottom: 5px; }
  .tweak-row select, .tweak-row input[type=range] { width: 100%; font-family: inherit; }
  .tweak-row select { font-size: 12px; border: 1px solid #e4e4e7; border-radius: 6px; padding: 5px 8px; color: #18181b; background: #fff; }
  .tweak-row input[type=range] { accent-color: #4f46e5; }
  .tweak-swatch-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweak-swatch { width: 22px; height: 22px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; }
  .tweak-swatch.selected { border-color: #18181b; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#4f46e5",
  "sidebarStyle": "dark",
  "density": "default",
  "landingStyle": "dark"
}/*EDITMODE-END*/;

// ─── Tokens ──────────────────────────────────────────────────────────────────
const T = {
  indigo:  { bg: '#4f46e5', light: '#eef2ff', text: '#4338ca', muted: '#818cf8' },
  emerald: { bg: '#059669', light: '#ecfdf5', text: '#065f46', muted: '#34d399' },
  rose:    { bg: '#e11d48', light: '#fff1f2', text: '#9f1239', muted: '#fb7185' },
  amber:   { bg: '#d97706', light: '#fffbeb', text: '#92400e', muted: '#fbbf24' },
};

// ─── Icons (inline SVG) ───────────────────────────────────────────────────────
const Icon = ({ name, size = 16, color = 'currentColor', style = {} }) => {
  const paths = {
    dashboard:   'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10',
    folder:      'M3 7a2 2 0 012-2h4l2 2h7a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2z',
    git:         'M18 3a3 3 0 00-3 3v.268A3 3 0 0013 9a3 3 0 001.268 2.452 2.001 2.001 0 01-.268.048H12a3 3 0 00-3-3V3a3 3 0 00-6 0v3a3 3 0 003 3h.268A3.001 3.001 0 009 12v.268A3 3 0 008 15a3 3 0 003 3 3 3 0 003-3 3 3 0 00-1-2.268V12a1 1 0 011-1h2a3.98 3.98 0 001.268-.268A3 3 0 0018 12a3 3 0 003-3 3 3 0 00-3-3zM6 6a1 1 0 112 0 1 1 0 01-2 0zm5 9a1 1 0 112 0 1 1 0 01-2 0zm7-6a1 1 0 112 0 1 1 0 01-2 0z',
    users:       'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75 M9 11a4 4 0 100-8 4 4 0 000 8z',
    activity:    'M22 12h-4l-3 9L9 3l-3 9H2',
    bot:         'M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 017 7H3a7 7 0 017-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 012-2zM5 14v4a7 7 0 0014 0v-4H5zm4 2h2v2H9v-2zm4 0h2v2h-2v-2z',
    settings:    'M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z',
    logout:      'M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4 M16 17l5-5-5-5 M21 12H9',
    building:    'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10',
    chevron:     'M6 9l6 6 6-6',
    plus:        'M12 5v14M5 12h14',
    clock:       'M12 22a10 10 0 100-20 10 10 0 000 20z M12 6v6l4 2',
    file:        'M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z M14 2v6h6',
    tag:         'M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z M7 7h.01',
    check:       'M20 6L9 17l-5-5',
    x:           'M18 6L6 18M6 6l12 12',
    send:        'M22 2L11 13 M22 2L15 22l-4-9-9-4 22-7z',
    sparkle:     'M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z M19 17l.75 2.25L22 20l-2.25.75L19 23l-.75-2.25L16 20l2.25-.75z M5 3l.75 2.25L8 6l-2.25.75L5 9l-.75-2.25L2 6l2.25-.75z',
    eye:         'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 9a3 3 0 100 6 3 3 0 000-6z',
    shield:      'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
    zap:         'M13 2L3 14h9l-1 8 10-12h-9l1-8z',
    globe:       'M12 22a10 10 0 100-20 10 10 0 000 20z M2 12h20 M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z',
    arrowRight:  'M5 12h14M12 5l7 7-7 7',
    search:      'M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z',
    more:        'M12 13a1 1 0 100-2 1 1 0 000 2zM19 13a1 1 0 100-2 1 1 0 000 2zM5 13a1 1 0 100-2 1 1 0 000 2z',
    edit:        'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7 M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z',
    history:     'M3 3v5h5 M3.05 13A9 9 0 106 5.3L3 8',
    chevronR:    'M9 18l6-6-6-6',
    online:      'M5 12.55a11 11 0 0114.08 0 M1.42 9a16 16 0 0121.16 0 M8.53 16.11a6 6 0 016.95 0 M12 20h.01',
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"
      style={{ flexShrink: 0, ...style }}>
      {paths[name]?.split(' M').map((d, i) => (
        <path key={i} d={i === 0 ? d : 'M' + d} />
      ))}
    </svg>
  );
};

// ─── Avatar ───────────────────────────────────────────────────────────────────
const Avatar = ({ name, size = 32, color = '#4f46e5' }) => {
  const initials = name?.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() || 'U';
  const bg = { '#4f46e5': '#eef2ff', '#059669': '#ecfdf5', '#d97706': '#fffbeb' }[color] || '#eef2ff';
  const fg = { '#4f46e5': '#4338ca', '#059669': '#065f46', '#d97706': '#92400e' }[color] || '#4338ca';
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: bg, color: fg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.35, fontWeight: 700, flexShrink: 0 }}>
      {initials}
    </div>
  );
};

// ─── Badge ────────────────────────────────────────────────────────────────────
const Badge = ({ children, color = 'zinc', dot = false }) => {
  const colors = {
    indigo: { bg: '#eef2ff', text: '#4338ca' },
    emerald: { bg: '#ecfdf5', text: '#065f46' },
    rose: { bg: '#fff1f2', text: '#9f1239' },
    amber: { bg: '#fffbeb', text: '#92400e' },
    zinc: { bg: '#f4f4f5', text: '#52525b' },
    violet: { bg: '#f5f3ff', text: '#5b21b6' },
  };
  const c = colors[color] || colors.zinc;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5,
      background: c.bg, color: c.text, fontSize: 11, fontWeight: 600,
      padding: '3px 8px', borderRadius: 99, letterSpacing: '.02em', whiteSpace: 'nowrap' }}>
      {dot && <span style={{ width: 5, height: 5, borderRadius: '50%', background: c.text }} />}
      {children}
    </span>
  );
};

// ─── Button ───────────────────────────────────────────────────────────────────
const Btn = ({ children, variant = 'primary', size = 'md', onClick, style = {}, disabled = false, accent = '#4f46e5' }) => {
  const [hov, setHov] = React.useState(false);
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 6,
    fontFamily: 'inherit', fontWeight: 600, cursor: disabled ? 'not-allowed' : 'pointer',
    border: 'none', borderRadius: 8, transition: 'all .15s', whiteSpace: 'nowrap',
    fontSize: size === 'sm' ? 12 : size === 'lg' ? 14 : 13,
    padding: size === 'sm' ? '6px 12px' : size === 'lg' ? '11px 22px' : '8px 16px',
    opacity: disabled ? .55 : 1,
  };
  const styles = {
    primary: { background: hov ? '#4338ca' : accent, color: '#fff', boxShadow: '0 1px 2px rgba(79,70,229,.25)' },
    secondary: { background: hov ? '#f4f4f5' : '#fff', color: '#18181b', border: '1px solid #e4e4e7' },
    ghost: { background: hov ? '#f4f4f5' : 'transparent', color: '#52525b', border: 'none' },
    danger: { background: hov ? '#be123c' : '#e11d48', color: '#fff' },
  };
  return (
    <button style={{ ...base, ...styles[variant], ...style }}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      onClick={onClick} disabled={disabled}>
      {children}
    </button>
  );
};

// ─── Input ────────────────────────────────────────────────────────────────────
const Input = ({ placeholder, type = 'text', label, icon, value, onChange, style = {} }) => {
  const [focus, setFocus] = React.useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 5, ...style }}>
      {label && <label style={{ fontSize: 12, fontWeight: 600, color: '#3f3f46' }}>{label}</label>}
      <div style={{ position: 'relative' }}>
        {icon && <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: '#a1a1aa', pointerEvents: 'none' }}>
          <Icon name={icon} size={14} />
        </span>}
        <input type={type} placeholder={placeholder} value={value} onChange={onChange}
          onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
          style={{ width: '100%', fontFamily: 'inherit', fontSize: 13, fontWeight: 500,
            border: `1.5px solid ${focus ? '#4f46e5' : '#e4e4e7'}`,
            borderRadius: 8, padding: icon ? '9px 12px 9px 32px' : '9px 12px',
            outline: 'none', color: '#18181b', background: '#fff',
            boxShadow: focus ? '0 0 0 3px rgba(79,70,229,.1)' : 'none',
            transition: 'all .15s' }} />
      </div>
    </div>
  );
};

// ─── Card ─────────────────────────────────────────────────────────────────────
const Card = ({ children, style = {}, onClick, hover = false }) => {
  const [hov, setHov] = React.useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ background: '#fff', border: `1px solid ${hov && hover ? '#c7d2fe' : '#e4e4e7'}`,
        borderRadius: 12, transition: 'all .15s',
        boxShadow: hov && hover ? '0 4px 16px rgba(79,70,229,.08)' : '0 1px 3px rgba(0,0,0,.04)',
        cursor: onClick ? 'pointer' : 'default', ...style }}>
      {children}
    </div>
  );
};

// ─── Sidebar ──────────────────────────────────────────────────────────────────
const Sidebar = ({ page, setPage, tweaks }) => {
  const accent = tweaks.accentColor;
  const isDark = tweaks.sidebarStyle === 'dark';
  const bg = isDark ? '#18181b' : '#fff';
  const border = isDark ? '#27272a' : '#e4e4e7';
  const textMuted = isDark ? '#71717a' : '#a1a1aa';
  const textNormal = isDark ? '#a1a1aa' : '#71717a';
  const textActive = isDark ? '#fff' : '#18181b';
  const activeBg = isDark ? '#27272a' : '#f4f4f5';

  const global = [
    { id: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
  ];
  const workspace = [
    { id: 'documents', icon: 'folder', label: 'Documents' },
    { id: 'ai-assistant', icon: 'bot', label: 'AI Assistant' },
    { id: 'proposals', icon: 'git', label: 'Proposals' },
    { id: 'members', icon: 'users', label: 'Members' },
    { id: 'activity', icon: 'activity', label: 'Activity' },
    { id: 'settings', icon: 'settings', label: 'Settings' },
  ];

  const NavItem = ({ item }) => {
    const isActive = page === item.id;
    const [hov, setHov] = React.useState(false);
    return (
      <div onClick={() => setPage(item.id)}
        onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
        style={{ display: 'flex', alignItems: 'center', gap: 9,
          padding: '7px 10px', borderRadius: 8, cursor: 'pointer',
          background: isActive ? activeBg : hov ? (isDark ? '#27272a' : '#f9f9f9') : 'transparent',
          color: isActive ? textActive : hov ? (isDark ? '#d4d4d8' : '#3f3f46') : textNormal,
          borderLeft: isActive ? `2.5px solid ${accent}` : '2.5px solid transparent',
          transition: 'all .12s', marginBottom: 1 }}>
        <Icon name={item.icon} size={15} color={isActive ? accent : 'currentColor'} />
        <span style={{ fontSize: 13, fontWeight: isActive ? 600 : 500 }}>{item.label}</span>
      </div>
    );
  };

  return (
    <aside style={{ width: 220, background: bg, borderRight: `1px solid ${border}`,
      display: 'flex', flexDirection: 'column', height: '100%', flexShrink: 0 }}>
      {/* Logo */}
      <div style={{ padding: '16px 16px 14px', borderBottom: `1px solid ${border}`, display: 'flex', alignItems: 'center', gap: 9 }}>
        <div style={{ width: 28, height: 28, borderRadius: 8, background: accent,
          display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <span style={{ color: '#fff', fontSize: 13, fontWeight: 800 }}>C</span>
        </div>
        <span style={{ fontSize: 14, fontWeight: 700, color: isDark ? '#fff' : '#18181b' }}>CoWork</span>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#22c55e', display: 'block', boxShadow: '0 0 0 2px rgba(34,197,94,.25)' }} />
        </div>
      </div>

      {/* Workspace switcher */}
      <div style={{ padding: '10px 10px 8px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 10px',
          border: `1px solid ${border}`, borderRadius: 8, cursor: 'pointer', background: isDark ? '#27272a' : '#fafafa' }}>
          <Icon name="building" size={13} color={textMuted} />
          <span style={{ fontSize: 12, fontWeight: 600, color: isDark ? '#d4d4d8' : '#3f3f46', flex: 1, truncate: true }}>Design Team</span>
          <Icon name="chevron" size={12} color={textMuted} />
        </div>
      </div>

      {/* Nav */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 10px' }}>
        {global.map(item => <NavItem key={item.id} item={item} />)}
        <div style={{ marginTop: 16, marginBottom: 6, padding: '0 10px' }}>
          <span style={{ fontSize: 10, fontWeight: 700, color: textMuted, textTransform: 'uppercase', letterSpacing: '.08em' }}>Workspace</span>
        </div>
        {workspace.map(item => <NavItem key={item.id} item={item} />)}
      </div>

      {/* User */}
      <div style={{ padding: '10px 10px 14px', borderTop: `1px solid ${border}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '7px 10px',
          borderRadius: 8, cursor: 'pointer' }}>
          <Avatar name="Jane Doe" size={28} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: isDark ? '#d4d4d8' : '#18181b', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>Jane Doe</div>
            <div style={{ fontSize: 11, color: textMuted, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>jane@example.com</div>
          </div>
          <Icon name="chevron" size={12} color={textMuted} />
        </div>
      </div>
    </aside>
  );

                  <div style={{ height: 5, background: '#f4f4f5', borderRadius: 99, overflow: 'hidden', display: 'flex' }}>

// ─── SHELL ────────────────────────────────────────────────────────────────────
const dashboardPages = ['dashboard','documents','editor','proposals','members','activity','ai-assistant','settings'];
const pageTitles = {
  landing: 'Landing', login: 'Login', signup: 'Sign Up',
  dashboard: 'Dashboard', documents: 'Documents', editor: 'Doc Editor',
  proposals: 'Proposals', members: 'Members', activity: 'Activity',
  'ai-assistant': 'AI Assistant', settings: 'Settings'
};

function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('cw_page') || 'landing');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweakVisible, setTweakVisible] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('cw_page', page); }, [page]);

  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweakVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const inDashboard = dashboardPages.includes(page);

  const accentSwatches = ['#4f46e5','#7c3aed','#0ea5e9','#059669','#d97706','#e11d48'];

  return (
    <div className="page-wrapper">
      {/* Demo nav */}
      <div className="demo-nav">
        <span className="demo-nav-label">Pages</span>
        {Object.entries(pageTitles).map(([id, label]) => (
          <button key={id} className={`demo-btn${page === id ? ' active' : ''}`} onClick={() => setPage(id)}>{label}</button>
        ))}
      </div>

      <div className="page-content">
        {!inDashboard ? (
          page === 'landing' ? <LandingPage setPage={setPage} tweaks={tweaks} /> :
          <AuthPage mode={page} setPage={setPage} tweaks={tweaks} />
        ) : (
          <div style={{ display: 'flex', height: '100%' }}>
            {page !== 'editor' && <Sidebar page={page} setPage={setPage} tweaks={tweaks} />}
            {page === 'editor' && (
              <div style={{ width: 220, background: tweaks.sidebarStyle === 'dark' ? '#18181b' : '#fff', borderRight: '1px solid #e4e4e7', flexShrink: 0 }}>
                <Sidebar page={page} setPage={setPage} tweaks={tweaks} />
              </div>
            )}
            <main style={{ flex: 1, overflowY: page === 'editor' || page === 'ai-assistant' ? 'hidden' : 'auto', background: '#fafafa', height: '100%' }}>
              {page === 'dashboard'     && <DashboardPage setPage={setPage} tweaks={tweaks} />}
              {page === 'documents'     && <DocumentsPage setPage={setPage} tweaks={tweaks} />}
              {page === 'editor'        && <EditorPage setPage={setPage} tweaks={tweaks} />}
              {page === 'proposals'     && <ProposalsPage tweaks={tweaks} />}
              {page === 'members'       && <MembersPage tweaks={tweaks} />}
              {page === 'activity'      && <ActivityPage setPage={setPage} tweaks={tweaks} />}
              {page === 'ai-assistant'  && <AiAssistantPage tweaks={tweaks} />}
              {page === 'settings'      && <SettingsPage tweaks={tweaks} />}
            </main>
          </div>
        )}
      </div>

      {/* Tweaks panel */}
      <div className={`tweak-panel ${tweakVisible ? 'visible' : ''}`}>
        <div className="tweak-title">Tweaks</div>
        <div className="tweak-row">
          <label>Accent color</label>
          <div className="tweak-swatch-row">
            {accentSwatches.map(c => (
              <div key={c} className={`tweak-swatch${tweaks.accentColor === c ? ' selected' : ''}`}
                style={{ background: c }} onClick={() => updateTweak('accentColor', c)} />
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <label>Sidebar style</label>
          <select value={tweaks.sidebarStyle} onChange={e => updateTweak('sidebarStyle', e.target.value)}>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div className="tweak-row">
          <label>Landing style</label>
          <select value={tweaks.landingStyle} onChange={e => updateTweak('landingStyle', e.target.value)}>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
